version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_learning
      POSTGRES_USER: ai_learning
      POSTGRES_PASSWORD: strong_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_learning -d ai_learning"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend_a:
    build:
      context: ../..
      dockerfile: deploy/production/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://ai_learning:strong_password_change_me@postgres:5432/ai_learning
      DATABASE_POOL_SIZE: 30
      DATABASE_MAX_OVERFLOW: 60
      DATABASE_POOL_TIMEOUT_SECONDS: 30
      DATABASE_POOL_RECYCLE_SECONDS: 1800
      REDIS_URL: redis://redis:6379/0
      APP_INSTANCE_NAME: backend-a
      GUNICORN_WORKERS: 4
      GUNICORN_THREADS: 2
      GUNICORN_TIMEOUT_SECONDS: 180
      HEALTHCHECK_INCLUDE_VECTOR_STORE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - shared_temp_uploads:/app/temp_uploads
      - shared_chroma:/app/backend/chroma_db

  backend_b:
    build:
      context: ../..
      dockerfile: deploy/production/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://ai_learning:strong_password_change_me@postgres:5432/ai_learning
      DATABASE_POOL_SIZE: 30
      DATABASE_MAX_OVERFLOW: 60
      DATABASE_POOL_TIMEOUT_SECONDS: 30
      DATABASE_POOL_RECYCLE_SECONDS: 1800
      REDIS_URL: redis://redis:6379/0
      APP_INSTANCE_NAME: backend-b
      GUNICORN_WORKERS: 4
      GUNICORN_THREADS: 2
      GUNICORN_TIMEOUT_SECONDS: 180
      HEALTHCHECK_INCLUDE_VECTOR_STORE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - shared_temp_uploads:/app/temp_uploads
      - shared_chroma:/app/backend/chroma_db

  frontend_a:
    build:
      context: ../..
      dockerfile: deploy/production/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost

  frontend_b:
    build:
      context: ../..
      dockerfile: deploy/production/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend_a
      - backend_b
      - frontend_a
      - frontend_b
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  shared_temp_uploads:
  shared_chroma:
